        <g transform="translate(66 5) scale(2.2)"><path class="star star-2" d="M0 -3 L0.9 -0.9 L3 0 L0.9 0.9 L0 3 L-0.9 0.9 L-3 0 L-0.9 -0.9 Z"/></g>
        <g transform="translate(6 33) scale(2.6)"><path class="star star-3" d="M0 -3 L0.9 -0.9 L3 0 L0.9 0.9 L0 3 L-0.9 0.9 L-3 0 L-0.9 -0.9 Z"/></g>
